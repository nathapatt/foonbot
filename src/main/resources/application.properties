spring.application.name=temp

# Load local environment file automatically for development
spring.config.import=optional:file:.env[.properties]

# ─── PostgreSQL (Docker) ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:foonbot_db}
spring.datasource.username=${POSTGRES_USER:foonbot}
spring.datasource.password=${POSTGRES_PASSWORD:foonbot123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ─── H2 in-memory (uncomment + comment PostgreSQL above to run without Docker) ──
