spring.application.name=temp

# Load local environment file automatically for development
spring.config.import=optional:file:.env[.properties]

# ─── H2 In-Memory Database (dev/testing) ───────────────────────────────────────
# To switch to PostgreSQL later, replace this section with:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/airqualitydb
#   spring.datasource.username=postgres
#   spring.datasource.password=yourpassword
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:h2:mem:airqualitydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── IQAir API ──────────────────────────────────────────────────────────────────
iqair.api.key=${IQAIR_API_KEY:your_iqair_api_key_here}
iqair.api.url=https://api.airvisual.com/v2
iqair.city=Nakhon Nayok
iqair.state=Nakhon Nayok
iqair.country=Thailand

# ─── LINE Messaging API ────────────────────────────────────────────────────────
line.messaging.channel-token=${LINE_CHANNEL_TOKEN:your_line_channel_token_here}
line.messaging.broadcast-url=https://api.line.me/v2/bot/message/broadcast
line.messaging.reply-url=https://api.line.me/v2/bot/message/reply
