#spring.h2.console.path=/h2-console

# ─── IQAir API ──────────────────────────────────────────────────────────────────
iqair.api.key=${IQAIR_API_KEY:your_iqair_api_key_here}
iqair.api.url=https://api.airvisual.com/v2
iqair.city=Nakhon Nayok
iqair.state=Nakhon Nayok
iqair.country=Thailand

# ─── LINE Messaging API ────────────────────────────────────────────────────────
line.messaging.channel-token=${LINE_CHANNEL_TOKEN:your_line_channel_token_here}
line.messaging.broadcast-url=https://api.line.me/v2/bot/message/broadcast
line.messaging.reply-url=https://api.line.me/v2/bot/message/reply
line.messaging.push-url=https://api.line.me/v2/bot/message/push

# ─── LIFF ───────────────────────────────────────────────────────────────────────
liff.id=${LIFF_ID:2009767326-TJGFyp79}
