spring.application.name=temp

# ─── H2 In-Memory Database (dev/testing) ───────────────────────────────────────
# To switch to PostgreSQL later, replace this section with:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/airqualitydb
#   spring.datasource.username=postgres
#   spring.datasource.password=yourpassword
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:h2:mem:airqualitydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

