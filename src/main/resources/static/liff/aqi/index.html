<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoonBot – Check Air Quality</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 40px 28px;
      max-width: 320px;
      width: 90%;
    }

    .icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      transition: all 0.4s ease;
    }
    .icon.pulse      { animation: pulse 2s ease-in-out infinite; }
    .icon.error-icon { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.4); animation: none; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(100,200,255,0.4); }
      50%       { transform: scale(1.05); box-shadow: 0 0 0 16px rgba(100,200,255,0); }
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.3px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; }

    .status {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      min-height: 20px;
    }
    .status.success { color: #34C759; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .retry-btn {
      display: none;
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .retry-btn:active { opacity: 0.8; transform: scale(0.98); }

  </style>
</head>
<body>
  <div class="card">
    <div class="icon pulse" id="icon">🌿</div>
    <h1 id="title">Checking Air Quality</h1>
    <p id="subtitle">Getting your location to find the nearest air quality data…</p>
    <div class="status" id="status">
      <span class="spinner"></span> Initializing…
    </div>
    <button class="retry-btn" id="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>

  <script>
    const LIFF_ID    = '__LIFF_AQI_ID__';
    const API_ORIGIN = window.location.origin;

    const iconEl     = document.getElementById('icon');
    const titleEl    = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const statusEl   = document.getElementById('status');
    const retryBtn   = document.getElementById('retry-btn');

    function setStatus(msg, type = '') {
      statusEl.className = 'status ' + type;
      statusEl.innerHTML = (type === '' ? '<span class="spinner"></span> ' : '') + msg;
    }

    function showDenied() {
      iconEl.textContent = '📍';
      iconEl.className   = 'icon error-icon';
      titleEl.textContent    = 'Location Required';
      subtitleEl.textContent = 'Please allow location access to use this feature.';
      statusEl.style.display = 'none';
      retryBtn.style.display = 'block';
    }

    async function run() {
      setStatus('Initializing LINE…');
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) { liff.login(); return; }

      const idToken = liff.getIDToken();
      if (!idToken) {
        throw new Error('Unable to verify LINE login. Please reopen this page from LINE.');
      }

      setStatus('Getting your location…');
      const position = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000
        });
      });

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      setStatus('Fetching air quality data…');
      const res = await fetch(`${API_ORIGIN}/api/air-quality/by-location`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${idToken}`
        },
        body: JSON.stringify({ lat, lon })
      });

      if (!res.ok) throw new Error('Server error: ' + res.status);

      setStatus('Done! Check your LINE chat 🎉', 'success');
      setTimeout(() => liff.closeWindow(), 1500);
    }

    run().catch(err => {
      console.error(err);
      if (err.code === 1) {
        showDenied();
      } else {
        setStatus('Something went wrong: ' + err.message);
      }
    });
  </script>
</body>
</html>
