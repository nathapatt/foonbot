name: foonbot
services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - foonbot-net
    restart: unless-stopped

networks:
  foonbot-net:
    driver: bridge

volumes:
  db_data:
    driver: local
